name: Deploy to VPS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy files to VPS
        uses: easingthemes/ssh-deploy@main
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SERVER_SSH_KEY }}
          ARGS: "-rlgoDzvc -i --delete"
          SOURCE: "./"
          REMOTE_HOST: ${{ secrets.SERVER_IP }}
          REMOTE_USER: ${{ secrets.SERVER_USER }}
          TARGET: "/root/Bybit-bot"

      - name: Create .env and restart service
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /root/Bybit-bot
            cat > .env <<EOF
            BYBIT_API_KEY=${{ secrets.BYBIT_API_KEY }}
            BYBIT_API_SECRET=${{ secrets.BYBIT_API_SECRET }}
            SYMBOL=SOLUSDT
            TESTNET=true
            EOF
            chmod 600 .env
            apt update -y && apt install python3 python3-pip -y
            pip3 install -r requirements.txt
            systemctl restart bot || true
